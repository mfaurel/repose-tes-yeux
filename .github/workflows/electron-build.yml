name: Electron — Build CI

on:
  push:
    branches: [main]
    paths:
      - 'electron-app/**'
      - '.github/workflows/electron-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'electron-app/**'
      - '.github/workflows/electron-build.yml'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: electron-app
        run: npm run build:win

      - name: Build (macOS)
        if: runner.os == 'macOS'
        working-directory: electron-app
        run: npm run build:mac
        env:
          # Code signing skipped on CI — add CSC_LINK / CSC_KEY_PASSWORD secrets to sign
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build (Linux)
        if: runner.os == 'Linux'
        working-directory: electron-app
        run: npm run build:linux

      - name: List dist (debug)
        shell: bash
        run: ls -lh electron-app/dist/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ runner.os }}-ci
          path: |
            electron-app/dist/ReposeTesYeux-*.exe
            electron-app/dist/ReposeTesYeux-*.dmg
            electron-app/dist/ReposeTesYeux-*.AppImage
          if-no-files-found: warn
          retention-days: 7
