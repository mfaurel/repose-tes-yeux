name: Electron — Release

# Trigger by pushing a tag: git tag electron-v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'electron-v*'

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  # ── 1. Create the release shell so upload jobs can attach assets ──────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
      tag: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#electron-v}" >> $GITHUB_OUTPUT

      - name: Create release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          name: Repose Tes Yeux (Electron) v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Repose Tes Yeux — Electron v${{ steps.version.outputs.version }}

            Rappel de pause oculaire **20/20/20** — overlay toujours au premier plan,
            sur toutes les applications y compris plein écran, sur tous les moniteurs.

            ### Téléchargement

            | Plateforme | Fichier |
            |---|---|
            | Windows | `Repose-Tes-Yeux-Setup-*.exe` |
            | macOS (Intel) | `Repose-Tes-Yeux-*-x64.dmg` |
            | macOS (Apple Silicon) | `Repose-Tes-Yeux-*-arm64.dmg` |
            | Linux | `Repose-Tes-Yeux-*.AppImage` |

            ### Utilisation
            1. Installez / montez le fichier correspondant à votre OS
            2. Lancez **Repose Tes Yeux** — une icône apparaît dans la barre système
            3. La règle 20/20/20 démarre automatiquement
            4. Clic droit sur l'icône → **Tester le rappel maintenant** pour un test immédiat

  # ── 2. Platform matrix builds ─────────────────────────────────────────────
  build:
    name: Build & Upload (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: npm run build:win
            artifact_glob: "electron-app/dist/*.exe"

          - os: macos-latest
            build_cmd: npm run build:mac
            artifact_glob: "electron-app/dist/*.dmg"

          - os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_glob: "electron-app/dist/*.AppImage"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      # macOS: skip code signing unless secrets are configured
      # To enable: add CSC_LINK (base64 .p12) + CSC_KEY_PASSWORD + APPLE_ID +
      # APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID secrets in repo settings
      - name: Build
        working-directory: electron-app
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'false' || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: ${{ matrix.artifact_glob }}
