name: Electron — Release

# Trigger: git tag electron-v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'electron-v*'

permissions:
  contents: write

jobs:
  # ── 1. Create the GitHub Release (empty, assets attached by build jobs) ────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ github.ref_name }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#electron-v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Repose Tes Yeux (Electron) v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Repose Tes Yeux — Electron v${{ steps.version.outputs.version }}

            Rappel de pause oculaire **20/20/20** — overlay toujours au premier plan,
            sur toutes les applications y compris plein écran, sur tous les moniteurs.

            ### Téléchargement

            | Plateforme | Fichier | Note |
            |---|---|---|
            | macOS Intel | `ReposeTesYeux-*-x64.dmg` | |
            | macOS Apple Silicon | `ReposeTesYeux-*-arm64.dmg` | |
            | Linux | `ReposeTesYeux-*-x64.AppImage` | `chmod +x` puis lancer |

            ### Utilisation
            1. Téléchargez le fichier correspondant à votre OS
            2. Lancez **Repose Tes Yeux** — une icône apparaît dans la barre système
            3. La règle 20/20/20 démarre automatiquement
            4. Clic droit sur l'icône → **Tester le rappel maintenant** pour un test immédiat

  # ── 2. Build on each platform and attach assets to the release ────────────
  build:
    name: Build & Upload (${{ matrix.name }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            build_cmd: npm run build:mac
            artifact_glob: electron-app/dist/ReposeTesYeux-*.dmg

          - name: Linux
            os: ubuntu-latest
            build_cmd: npm run build:linux
            artifact_glob: electron-app/dist/ReposeTesYeux-*.AppImage

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-app/package-lock.json

      - name: Install dependencies
        working-directory: electron-app
        run: npm ci

      - name: Build
        working-directory: electron-app
        run: ${{ matrix.build_cmd }}
        env:
          # macOS: code signing skipped unless secrets are set.
          # To enable: add CSC_LINK (base64 .p12), CSC_KEY_PASSWORD,
          # APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID in repo secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: List dist (debug)
        shell: bash
        run: ls -lh electron-app/dist/ || true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true
