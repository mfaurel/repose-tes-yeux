name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ReposeTestYeux.sln

      - name: Test
        run: dotnet test ReposeTestYeux.Tests/ReposeTestYeux.Tests.csproj --no-restore --verbosity normal

      - name: Publish
        run: >
          dotnet publish ReposeTestYeux/ReposeTestYeux.csproj
          -c Release
          -r win-x64
          --self-contained false
          -p:PublishSingleFile=true
          -o publish/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Repose Tes Yeux ${{ github.ref_name }}
          body: |
            ## Repose Tes Yeux ${{ github.ref_name }}

            Rappel de pause oculaire 20/20/20 pour Windows.

            ### Installation
            1. Téléchargez `ReposeTesYeux.exe`
            2. Lancez l'exécutable (nécessite [.NET 8 Runtime](https://dotnet.microsoft.com/download/dotnet/8.0))
            3. L'icône apparaît dans la barre des tâches — la règle 20/20/20 démarre automatiquement
          files: publish/ReposeTesYeux.exe
          draft: false
          prerelease: false
