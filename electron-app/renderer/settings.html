<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paramètres</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="page">
    <h1 class="page-title" id="pageTitle">Paramètres</h1>

    <!-- Timer -->
    <section class="section">
      <h2 class="section-title" id="secTimer">Minuterie</h2>
      <div class="field">
        <label id="lblInterval">Intervalle de travail (minutes)</label>
        <div class="range-row">
          <input type="range" id="workIntervalMinutes" min="1" max="120" step="1" value="20" />
          <span class="range-val" id="workIntervalMinutesVal">20</span>
        </div>
      </div>
      <div class="field">
        <label id="lblDuration">Durée de la pause (secondes)</label>
        <div class="range-row">
          <input type="range" id="breakDurationSeconds" min="5" max="300" step="5" value="20" />
          <span class="range-val" id="breakDurationSecondsVal">20</span>
        </div>
      </div>
    </section>

    <!-- Overlay -->
    <section class="section">
      <h2 class="section-title" id="secOverlay">Overlay</h2>
      <div class="field">
        <label id="lblDistance">Distance de regard (mètres)</label>
        <div class="range-row">
          <input type="range" id="distanceMetres" min="1" max="100" step="1" value="20" />
          <span class="range-val" id="distanceMetresVal">20</span>
        </div>
      </div>
      <div class="field">
        <label id="lblMessage">Message personnalisé</label>
        <input type="text" id="overlayMessage" placeholder="Laisse vide pour le message par défaut" />
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="overlayDismissible" />
        <label for="overlayDismissible" id="lblDismissible">Afficher le bouton « Passer »</label>
      </div>
    </section>

    <!-- System -->
    <section class="section">
      <h2 class="section-title" id="secSystem">Système</h2>
      <div class="field">
        <label id="lblLanguage">Langue</label>
        <select id="language">
          <option value="fr-FR">Français</option>
          <option value="en-GB">English</option>
        </select>
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="launchAtStartup" />
        <label for="launchAtStartup" id="lblStartup">Lancer au démarrage de Windows</label>
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="soundEnabled" />
        <label for="soundEnabled" id="lblSound">Sons activés</label>
      </div>
      <div class="field dnd-row">
        <label id="lblDndStart">Ne pas déranger — début</label>
        <input type="time" id="doNotDisturbStart" />
      </div>
      <div class="field dnd-row">
        <label id="lblDndEnd">Ne pas déranger — fin</label>
        <input type="time" id="doNotDisturbEnd" />
      </div>
    </section>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-secondary" id="cancelBtn">Annuler</button>
      <button class="btn-primary"   id="saveBtn">Enregistrer</button>
    </div>
  </div>
  <script src="settings-renderer.js"></script>
</body>
</html>
