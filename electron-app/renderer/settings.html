<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paramètres</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div class="page">
    <h1 class="page-title" id="pageTitle">Paramètres</h1>

    <!-- Timer -->
    <section class="section">
      <h2 class="section-title" id="secTimer">Minuterie</h2>
      <div class="field">
        <label id="lblInterval">Intervalle de travail (minutes)</label>
        <div class="range-row">
          <input type="range" id="workIntervalMinutes" min="1" max="120" step="1" value="20" />
          <span class="range-val" id="workIntervalMinutesVal">20</span>
        </div>
      </div>
      <div class="field">
        <label id="lblDuration">Durée de la pause (secondes)</label>
        <div class="range-row">
          <input type="range" id="breakDurationSeconds" min="5" max="300" step="5" value="20" />
          <span class="range-val" id="breakDurationSecondsVal">20</span>
        </div>
      </div>
    </section>

    <!-- Overlay -->
    <section class="section">
      <h2 class="section-title" id="secOverlay">Overlay</h2>
      <div class="field">
        <label id="lblDistance">Distance de regard (mètres)</label>
        <div class="range-row">
          <input type="range" id="distanceMetres" min="1" max="100" step="1" value="20" />
          <span class="range-val" id="distanceMetresVal">20</span>
        </div>
      </div>
      <div class="field">
        <label id="lblMessage">Message personnalisé</label>
        <input type="text" id="overlayMessage" placeholder="Laisse vide pour le message par défaut" />
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="overlayDismissible" />
        <label for="overlayDismissible" id="lblDismissible">Afficher le bouton « Passer »</label>
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="exercisesEnabled" />
        <label for="exercisesEnabled" id="lblExercises">Afficher un exercice pendant la pause</label>
      </div>
    </section>

    <!-- Advanced breaks -->
    <section class="section">
      <h2 class="section-title" id="secAdvanced">Pauses avancées</h2>
      <div class="field">
        <label id="lblLongBreakEvery">Grande pause toutes les N pauses (0 = désactivé)</label>
        <div class="range-row">
          <input type="range" id="longBreakEvery" min="0" max="20" step="1" value="0" />
          <span class="range-val" id="longBreakEveryVal">0</span>
        </div>
      </div>
      <div class="field">
        <label id="lblLongBreakDur">Durée de la grande pause (secondes)</label>
        <div class="range-row">
          <input type="range" id="longBreakDurationSeconds" min="60" max="900" step="30" value="300" />
          <span class="range-val" id="longBreakDurationSecondsVal">300</span>
        </div>
      </div>
      <div class="field">
        <label id="lblPosture">Rappel de posture toutes les N minutes (0 = désactivé)</label>
        <div class="range-row">
          <input type="range" id="postureReminderMinutes" min="0" max="120" step="5" value="0" />
          <span class="range-val" id="postureReminderMinutesVal">0</span>
        </div>
      </div>
      <div class="field dnd-row">
        <label id="lblEndOfDay">Heure cible de fin de journée</label>
        <input type="time" id="endOfDayTarget" />
      </div>
    </section>

    <!-- Keyboard shortcuts -->
    <section class="section">
      <h2 class="section-title" id="secShortcuts">Raccourcis clavier</h2>
      <div class="field">
        <label id="lblShortcutPause">Raccourci arrêt/reprise</label>
        <input type="text" id="shortcutPause" placeholder="ex: Ctrl+Alt+P" />
      </div>
      <div class="field">
        <label id="lblShortcutBreak">Raccourci pause immédiate</label>
        <input type="text" id="shortcutBreak" placeholder="ex: Ctrl+Alt+B" />
      </div>
    </section>

    <!-- System -->
    <section class="section">
      <h2 class="section-title" id="secSystem">Système</h2>
      <div class="field">
        <label id="lblTheme">Thème</label>
        <select id="theme">
          <option value="auto">Automatique (Windows)</option>
          <option value="dark">Sombre</option>
          <option value="light">Clair</option>
        </select>
      </div>
      <div class="field">
        <label id="lblLanguage">Langue</label>
        <select id="language">
          <option value="fr-FR">Français</option>
          <option value="en-GB">English</option>
        </select>
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="launchAtStartup" />
        <label for="launchAtStartup" id="lblStartup">Lancer au démarrage de Windows</label>
      </div>
      <div class="field checkbox-field">
        <input type="checkbox" id="soundEnabled" />
        <label for="soundEnabled" id="lblSound">Sons activés</label>
      </div>
      <div class="field dnd-row">
        <label id="lblDndStart">Ne pas déranger — début</label>
        <input type="time" id="doNotDisturbStart" />
      </div>
      <div class="field dnd-row">
        <label id="lblDndEnd">Ne pas déranger — fin</label>
        <input type="time" id="doNotDisturbEnd" />
      </div>
    </section>

    <!-- Actions -->
    <div class="actions">
      <button class="btn-secondary" id="cancelBtn">Annuler</button>
      <button class="btn-primary"   id="saveBtn">Enregistrer</button>
    </div>
  </div>
  <script src="settings-renderer.js"></script>
</body>
</html>
