<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Statistiques</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4fc3f7;
      --bg:     #0d1628;
      --text:   #e0f7ff;
      --text-muted: rgba(224, 247, 255, 0.55);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      padding: 32px 40px;
      border: 1px solid rgba(79, 195, 247, 0.2);
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .label {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .count {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      filter: drop-shadow(0 0 12px rgba(79, 195, 247, 0.5));
    }

    .close-hint {
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="label"  id="label">Pauses aujourd'hui</p>
    <p class="count"  id="count">—</p>
    <p class="close-hint" id="hint">Appuyez sur Échap pour fermer</p>
  </div>
  <script src="stats-renderer.js"></script>
</body>
</html>
