<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Statistiques</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4fc3f7;
      --accent-dim: rgba(79, 195, 247, 0.12);
      --accent-border: rgba(79, 195, 247, 0.2);
      --bg:     #0d1628;
      --surface: rgba(255, 255, 255, 0.04);
      --text:   #e0f7ff;
      --text-muted: rgba(224, 247, 255, 0.55);
      --green: #66bb6a;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --accent: #0277bd;
        --accent-dim: rgba(2, 119, 189, 0.08);
        --accent-border: rgba(2, 119, 189, 0.2);
        --bg: #f0f8ff;
        --surface: rgba(0, 0, 0, 0.03);
        --text: #0d1628;
        --text-muted: rgba(13, 22, 40, 0.55);
      }
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow-y: auto;
    }

    .page {
      padding: 20px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .page-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid var(--accent-border);
      padding-bottom: 10px;
    }

    /* ── Stat cards row ── */
    .stat-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      filter: drop-shadow(0 0 8px rgba(79, 195, 247, 0.4));
      line-height: 1;
    }

    .stat-sub {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* ── History section ── */
    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .history-table th {
      color: var(--text-muted);
      font-weight: 600;
      text-align: left;
      padding: 4px 6px;
      border-bottom: 1px solid var(--accent-border);
    }

    .history-table td {
      padding: 5px 6px;
      color: var(--text);
      border-bottom: 1px solid rgba(79, 195, 247, 0.07);
    }

    .history-table tr:last-child td { border-bottom: none; }

    .history-table td:nth-child(2),
    .history-table td:nth-child(3) {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }

    .no-history {
      color: var(--text-muted);
      font-size: 0.82rem;
      text-align: center;
      padding: 12px;
    }

    /* ── Export ── */
    .export-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .export-label {
      color: var(--text-muted);
      font-size: 0.8rem;
      flex: 1;
    }

    .btn-export {
      padding: 7px 16px;
      border-radius: 100px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: 1px solid var(--accent-border);
      color: var(--text-muted);
    }

    .btn-export:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-dim);
    }

    .btn-export:active { transform: scale(0.97); }

    .close-hint {
      color: var(--text-muted);
      font-size: 0.72rem;
      text-align: center;
      margin-top: 2px;
    }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      padding: 12px 14px 8px;
    }

    .chart-svg {
      width: 100%;
      height: 90px;
      display: block;
      overflow: visible;
    }

    .chart-bar { fill: var(--accent); opacity: 0.55; }
    .chart-bar.today { opacity: 1; }
    .chart-bar.zero  { fill: var(--accent-border); opacity: 1; }

    .chart-axis {
      display: flex;
      justify-content: space-between;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.68rem;
    }

    /* ── Streak ── */
    .streak-card {
      display: flex;
      align-items: baseline;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      padding: 14px 20px;
    }

    .streak-value {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      filter: drop-shadow(0 0 8px rgba(79, 195, 247, 0.4));
      line-height: 1;
    }

    .streak-unit {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ── Badges ── */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .badge-item {
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .badge-item.locked {
      opacity: 0.3;
    }

    .badge-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
    }

    .badge-item.locked .badge-name {
      color: var(--text-muted);
    }

    .badge-desc {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="page-title" id="pageTitle">Statistiques</p>

    <!-- Today + all-time -->
    <div class="stat-row">
      <div class="stat-card">
        <span class="stat-label" id="lblToday">Aujourd'hui</span>
        <span class="stat-value" id="countToday">—</span>
        <span class="stat-sub"  id="subToday"></span>
      </div>
      <div class="stat-card">
        <span class="stat-label" id="lblTotal">Total</span>
        <span class="stat-value" id="countTotal">—</span>
        <span class="stat-sub"  id="subTotal"></span>
      </div>
    </div>

    <!-- History -->
    <div>
      <p class="section-title" id="lblHistory">Historique (7 derniers jours)</p>
      <div id="historyContainer">
        <p class="no-history" id="noHistory">Aucune donnée</p>
      </div>
    </div>

    <!-- Export -->
    <div class="export-row">
      <span class="export-label" id="lblExport">Exporter :</span>
      <button class="btn-export" id="exportCsv">CSV</button>
      <button class="btn-export" id="exportJson">JSON</button>
    </div>

    <!-- Chart -->
    <div>
      <p class="section-title" id="lblChart">30 derniers jours</p>
      <div class="chart-wrap">
        <svg id="chartSvg" class="chart-svg" viewBox="0 0 440 90" preserveAspectRatio="none"></svg>
        <div class="chart-axis">
          <span id="chartAxisStart"></span>
          <span id="chartAxisEnd"></span>
        </div>
      </div>
    </div>

    <!-- Streak -->
    <div>
      <p class="section-title" id="lblStreak">Jours actifs</p>
      <div class="streak-card">
        <span class="streak-value" id="streakValue">0</span>
        <span class="streak-unit" id="streakUnit">jour</span>
      </div>
    </div>

    <!-- Badges -->
    <div>
      <p class="section-title" id="lblBadges">Badges</p>
      <div class="badge-grid" id="badgeGrid"></div>
    </div>

    <p class="close-hint" id="hint">Appuyez sur Échap pour fermer</p>
  </div>
  <script src="stats-renderer.js"></script>
</body>
</html>
